name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install deps
        run: cd bedside-native && npm install --legacy-peer-deps
      - name: Build APK
        run: cd bedside-native && eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: List artifacts
        run: cd bedside-native && eas build:list --platform android --status finished --limit 1 --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true